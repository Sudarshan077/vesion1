spring:
  application:
    name: dms-backend

  # Using H2 in-memory database for development (no PostgreSQL needed!)
  datasource:
    url: jdbc:h2:mem:dms_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # H2 Console - access at http://localhost:8080/h2-console
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

server:
  port: 8080
